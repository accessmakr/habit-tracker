<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Habits</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #007aff;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow-subtle: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
            --border-radius: 16px;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            
            /* Architectural Constants */
            --anim-fast: 0.2s;
            --anim-med: 0.3s;
            --anim-slow: 0.4s;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
            /* Account for safe area and floating input */
            padding-bottom: calc(100px + env(safe-area-inset-bottom));
        }

        /* Accessibility: Focus visible styling */
        :focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }
        
        header {
            padding: var(--spacing-xl) 0 var(--spacing-md);
            position: sticky;
            top: 0;
            background: #f5f5f7; /* Fallback for browsers without backdrop-filter */
            background: rgba(245, 245, 247, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: var(--spacing-xs);
        }
        
        .date-display {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-text {
            font-size: 14px;
            color: var(--accent-color);
            font-weight: 600;
            margin-top: var(--spacing-xs);
            min-height: 21px;
            transition: opacity var(--anim-med) ease;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 64px var(--spacing-md);
            animation: fadeIn var(--anim-slow) ease;
        }
        
        .empty-state-icon {
            width: 64px;
            height: 64px;
            background: var(--surface-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-subtle);
            margin-bottom: var(--spacing-lg);
            color: var(--accent-color);
        }
        
        .empty-state h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
        }
        
        .empty-state p {
            color: var(--text-secondary);
            font-size: 15px;
            max-width: 260px;
        }

        .suggested-btn {
            background: rgba(0, 122, 255, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(0, 122, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--anim-fast) ease;
            margin-top: var(--spacing-md);
            box-shadow: var(--shadow-subtle);
            min-height: 44px; /* Mobile safe tap target */
        }

        .suggested-btn:active {
            transform: scale(0.96);
            background: rgba(0, 122, 255, 0.2);
        }
        
        .habit-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }
        
        .habit-card {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            padding: var(--spacing-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-subtle);
            transition: transform var(--anim-fast) cubic-bezier(0.2, 0, 0, 1), box-shadow var(--anim-fast) ease, opacity var(--anim-med) ease, background-color var(--anim-med) ease;
            border: 1px solid rgba(0,0,0,0.02);
            animation: slideUp var(--anim-med) ease forwards;
            user-select: none;
            position: relative;
        }

        /* Overarching hidden native button to solve semantic nesting & event issues */
        .toggle-card-btn {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 1;
            border: none;
            background: transparent;
            border-radius: inherit;
        }

        /* Moves visual focus to the transparent button boundaries */
        .toggle-card-btn:focus-visible {
            opacity: 1;
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }
        
        .habit-card:active:has(.toggle-card-btn:active) {
            transform: scale(0.98);
            background-color: #fafafa;
        }
        
        .habit-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            padding-right: var(--spacing-sm);
            overflow: hidden;
            pointer-events: none; /* Let clicks reach toggle button */
            z-index: 0;
        }
        
        .habit-name {
            font-size: 16px;
            font-weight: 600;
            transition: color var(--anim-fast) ease;
            overflow-wrap: break-word;
            word-wrap: break-word;
            word-break: break-word;
            hyphens: auto;
        }
        
        .habit-streak {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .streak-icon {
            color: #ff9500;
            font-size: 12px;
        }

        .habit-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 2; /* Sits above toggle button */
            pointer-events: none; /* So the checkbox passes clicks down */
        }
        
        .checkbox-container {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--anim-fast) ease;
            background: transparent;
        }
        
        .checkbox-container svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 24;
            stroke-dashoffset: 24;
            transition: stroke-dashoffset var(--anim-med) cubic-bezier(0.65, 0, 0.45, 1);
        }
        
        .habit-card.completed {
            opacity: 0.75;
            background-color: #fafafa;
        }

        .habit-card.completed .checkbox-container {
            background: var(--accent-color);
            border-color: var(--accent-color);
            transform: scale(1.05);
        }
        
        .habit-card.completed .checkbox-container svg {
            stroke-dashoffset: 0;
        }
        
        .habit-card.completed .habit-name {
            color: var(--text-secondary);
            text-decoration: line-through;
            text-decoration-color: rgba(0,0,0,0.2);
        }
        
        .add-form-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: var(--spacing-md) var(--spacing-md) calc(var(--spacing-md) + env(safe-area-inset-bottom));
            background: rgba(245, 245, 247, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            z-index: 20;
        }
        
        .add-form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: var(--spacing-sm);
        }
        
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 14px var(--spacing-md);
            font-size: 16px; /* 16px minimum prevents iOS zoom */
            border: 1px solid var(--border-color);
            border-radius: 24px;
            background: var(--surface-color);
            color: var(--text-primary);
            outline: none;
            box-shadow: var(--shadow-subtle);
            transition: border-color var(--anim-fast) ease, box-shadow var(--anim-fast) ease, color var(--anim-fast) ease;
        }
        
        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }
        
        input[type="text"]::placeholder {
            color: #a1a1a6;
        }

        .input-duplicate {
            animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
            color: #ff3b30 !important;
            border-color: #ff3b30 !important;
        }
        
        button[type="submit"] {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: var(--accent-color);
            color: white;
            border: none;
            font-size: 24px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-subtle);
            cursor: pointer;
            transition: transform var(--anim-fast) ease, background var(--anim-fast) ease;
        }
        
        button[type="submit"]:active {
            transform: scale(0.92);
            background: #0062cc;
        }
        
        button[type="submit"]:disabled {
            background: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }
        
        .delete-btn {
            background: transparent;
            border: none;
            color: #ff3b30;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none; /* Off by default, on hover/focus */
            transition: opacity var(--anim-fast) ease, transform var(--anim-fast) ease;
            cursor: pointer;
            margin-right: -4px;
            border-radius: 50%;
        }
        
        .habit-card:hover .delete-btn,
        .habit-card:focus-within .delete-btn,
        .delete-btn:focus-visible {
            opacity: 1;
            pointer-events: auto; /* Active zone over toggle-card */
        }

        .delete-btn:active {
            transform: scale(0.9);
            background: rgba(255, 59, 48, 0.1);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Comprehensive Reduced Motion Architecture */
        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after {
                animation: none !important;
                transition: none !important;
                transform: none !important;
            }
        }
        
        @media (max-width: 600px) {
            .habit-card:hover .delete-btn {
                opacity: 0;
                pointer-events: none;
            }
            .delete-btn {
                opacity: 1;
                pointer-events: auto;
                color: #d2d2d7; 
            }
            .delete-btn:focus-visible {
                color: #ff3b30;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="date-display" id="date-display" aria-live="polite"></div>
            <h1>Habits</h1>
            <div id="progress-text" class="progress-text" aria-live="polite" aria-atomic="true"></div>
        </header>

        <main>
            <div class="empty-state" id="empty-state" style="display: none;" aria-live="polite">
                <div class="empty-state-icon" aria-hidden="true">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h2>Build consistency</h2>
                <p>Start tracking your daily routines. Add your first habit below.</p>
                <div id="onboarding-cta" style="display: none;">
                    <button type="button" class="suggested-btn" id="suggested-btn">Start with "Drink water"</button>
                </div>
            </div>

            <ul class="habit-list" id="habit-list" aria-label="Your Habits"></ul>
        </main>
    </div>

    <div class="add-form-container">
        <form class="add-form" id="add-habit-form">
            <div class="input-wrapper">
                <input type="text" id="habit-input" placeholder="Add a new habit..." autocomplete="off" aria-label="Add a new habit" maxlength="60">
            </div>
            <button type="submit" id="add-btn" aria-label="Add habit" disabled>+</button>
        </form>
    </div>

    <script>
        // --- 1. Architectural Constants ---
        const CONFIG = {
            STORAGE_KEY: 'mckinsey_habits_v3',
            MAX_HABITS: 50,
            MAX_LENGTH: 60,
            SW_CACHE_NAME: 'habits-cache-v4'
        };

        // --- 2. Manifest & Safe PWA Installation ---
        const manifest = {
            name: "Habits Tracker",
            short_name: "Habits",
            display: "standalone",
            background_color: "#f5f5f7",
            theme_color: "#ffffff",
            start_url: location.href.split('?')[0],
            icons: [{
                src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIyIiBmaWxsPSIjMDA3YWZmIi8+PHBhdGggZD0iTTMwIDUwIEw0NSA2NSBMMzAgMzAiIHN0cm9rZT0iI2ZmZiIgc3Ryb2tlLXdpZHRoPSI4IiBmaWxsPSJub25lIi8+PC9zdmc+",
                sizes: "192x192",
                type: "image/svg+xml"
            }]
        };
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
        document.head.appendChild(manifestLink);

        // --- 3. Self-Contained Service Worker Generator ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = '${CONFIG.SW_CACHE_NAME}';
                    const APP_URL = location.origin + location.pathname;
                    
                    self.addEventListener('install', e => {
                        self.skipWaiting();
                        e.waitUntil(caches.open(CACHE_NAME).then(c => c.add(new Request(APP_URL))));
                    });
                    
                    self.addEventListener('activate', e => {
                        e.waitUntil(caches.keys().then(keys => Promise.all(
                            keys.filter(k => k !== CACHE_NAME && k.startsWith('habits-cache-'))
                                .map(k => caches.delete(k))
                        )));
                        self.clients.claim();
                    });
                    
                    self.addEventListener('fetch', e => {
                        if (e.request.method !== 'GET') return;
                        e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
                    });
                `;
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                
                navigator.serviceWorker.register(swUrl)
                    .then(() => URL.revokeObjectURL(swUrl))
                    .catch(() => URL.revokeObjectURL(swUrl));
            });
        }

        // --- 4. Application State & Storage Wrappers ---
        const safeGetStorage = (key) => {
            try { return localStorage.getItem(key); } catch(e) { return null; }
        };
        const safeSetStorage = (key, val) => {
            try { localStorage.setItem(key, val); } catch(e) {}
        };
        
        let habits = [];
        let isFirstVisit = safeGetStorage('habit_first_visit') !== 'false';
        let midnightTimer = null;
        let isSubmitting = false;

        // --- 5. DOM References Cache ---
        const listEl = document.getElementById('habit-list');
        const emptyStateEl = document.getElementById('empty-state');
        const formEl = document.getElementById('add-habit-form');
        const inputEl = document.getElementById('habit-input');
        const addBtn = document.getElementById('add-btn');
        const dateDisplay = document.getElementById('date-display');
        const progressDisplay = document.getElementById('progress-text');
        const onboardingCta = document.getElementById('onboarding-cta');
        const suggestedBtn = document.getElementById('suggested-btn');
        
        // Node Cache for O(n) rendering
        const domNodes = new Map();

        // --- 6. Core Utilities ---
        const generateStableId = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return Date.now().toString(36) + Math.random().toString(36).substring(2, 9);
        };

        const cleanInput = (str) => String(str || '').replace(/\s+/g, ' ').trim();
        
        const isValidHabitName = (str) => {
            const cleaned = cleanInput(str);
            return cleaned.length > 0 && cleaned.length <= CONFIG.MAX_LENGTH && /[^\s\u200B-\u200D\uFEFF]/.test(cleaned);
        };

        const isDuplicateHabit = (str) => {
            const target = cleanInput(str).toLowerCase();
            return habits.some(h => cleanInput(h.name).toLowerCase() === target);
        };

        // --- 7. Strict Timezone-Safe Date Logic ---
        const getTodayString = () => {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const getPreviousDateString = (dateStr) => {
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            const d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
            d.setDate(d.getDate() - 1);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const setDateHeader = () => {
            try {
                // Determine user's locale dynamically, fallback to en-US formatting style
                const userLocale = navigator.language || 'en-US';
                dateDisplay.textContent = new Intl.DateTimeFormat(userLocale, { 
                    weekday: 'long', month: 'long', day: 'numeric' 
                }).format(new Date()).toUpperCase();
            } catch (e) {
                dateDisplay.textContent = new Date().toDateString().toUpperCase();
            }
        };

        const scheduleMidnightUpdate = () => {
            if (midnightTimer) clearTimeout(midnightTimer);
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const msUntilMidnight = tomorrow - now;
            
            midnightTimer = setTimeout(() => {
                setDateHeader();
                render();
                scheduleMidnightUpdate();
            }, msUntilMidnight + 1000); // 1s buffer to ensure date rollover
        };

        // --- 8. Safe Data Management ---
        const validateDateFormat = (d) => /^\d{4}-\d{2}-\d{2}$/.test(d);
        
        const loadData = () => {
            const data = safeGetStorage(CONFIG.STORAGE_KEY) || safeGetStorage('mckinsey_habits_v2');
            let rawHabits = [];
            
            if (data) {
                try { 
                    rawHabits = JSON.parse(data); 
                    if (!Array.isArray(rawHabits)) rawHabits = [];
                } catch (e) { rawHabits = []; }
            }

            const sanitizedHabits = rawHabits.slice(0, CONFIG.MAX_HABITS).map(h => {
                const validCompleted = Array.isArray(h?.completedDates) 
                    ? [...new Set(h.completedDates.filter(validateDateFormat))] 
                    : [];
                return {
                    id: String(h?.id || generateStableId()),
                    name: typeof h?.name === 'string' ? cleanInput(h.name) : 'Unnamed Habit',
                    createdAt: validateDateFormat(h?.createdAt) ? h.createdAt : getTodayString(),
                    completedDates: validCompleted
                };
            });

            // Write only if migration/sanitization changed string output
            if (JSON.stringify(sanitizedHabits) !== data) {
                habits = sanitizedHabits;
                saveData();
            } else {
                habits = sanitizedHabits;
            }
        };

        const saveData = () => safeSetStorage(CONFIG.STORAGE_KEY, JSON.stringify(habits));

        const calculateStreak = (completedDates) => {
            if (!completedDates || completedDates.length === 0) return 0;
            const datesSet = new Set(completedDates);
            const today = getTodayString();
            const yesterday = getPreviousDateString(today);

            let streak = 0;
            let expectedDate = datesSet.has(today) ? today : (datesSet.has(yesterday) ? yesterday : null);
            if (!expectedDate) return 0;

            while (datesSet.has(expectedDate)) {
                streak++;
                expectedDate = getPreviousDateString(expectedDate);
            }
            return streak;
        };

        // --- 9. DOM Node Factory (innerHTML bypass) ---
        const createHabitNode = (habit) => {
            const li = document.createElement('li');
            li.className = 'habit-card';
            li.dataset.id = habit.id;

            const toggleBtn = document.createElement('button');
            toggleBtn.className = 'toggle-card-btn';
            toggleBtn.setAttribute('aria-label', `Toggle completion for ${habit.name}`);
            toggleBtn.type = 'button';

            const infoDiv = document.createElement('div');
            infoDiv.className = 'habit-info';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'habit-name';

            const streakDiv = document.createElement('div');
            streakDiv.className = 'habit-streak';

            infoDiv.append(nameSpan, streakDiv);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'habit-actions';

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.setAttribute('aria-label', `Delete ${habit.name}`);
            deleteBtn.type = 'button';
            // Safe static SVG injection
            deleteBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';

            const checkboxDiv = document.createElement('div');
            checkboxDiv.className = 'checkbox-container';
            checkboxDiv.setAttribute('aria-hidden', 'true');
            checkboxDiv.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>';

            actionsDiv.append(deleteBtn, checkboxDiv);
            li.append(toggleBtn, infoDiv, actionsDiv);

            return { li, toggleBtn, nameSpan, streakDiv };
        };

        // --- 10. Core Mutations & Render Loop ---
        const render = () => {
            const today = getTodayString();
            let completedTodayCount = 0;

            if (habits.length === 0) {
                emptyStateEl.style.display = 'flex';
                listEl.style.display = 'none';
                progressDisplay.textContent = '';
                onboardingCta.style.display = isFirstVisit ? 'block' : 'none';
            } else {
                emptyStateEl.style.display = 'none';
                listEl.style.display = 'flex';
                
                if (isFirstVisit) {
                    safeSetStorage('habit_first_visit', 'false');
                    isFirstVisit = false;
                }

                // Cleanup deleted nodes from memory and DOM
                const currentIds = new Set(habits.map(h => h.id));
                for (const [id, nodeRef] of domNodes.entries()) {
                    if (!currentIds.has(id)) {
                        nodeRef.li.remove();
                        domNodes.delete(id);
                    }
                }

                // Optimal DOM synchronization
                habits.forEach((habit, index) => {
                    const isCompleted = habit.completedDates.includes(today);
                    if (isCompleted) completedTodayCount++;
                    const streakCount = calculateStreak(habit.completedDates);

                    let nodeRef = domNodes.get(habit.id);
                    if (!nodeRef) {
                        nodeRef = createHabitNode(habit);
                        domNodes.set(habit.id, nodeRef);
                        
                        // Action Binding
                        nodeRef.toggleBtn.addEventListener('click', () => {
                            toggleHabit(habit.id);
                        });
                        nodeRef.deleteBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            deleteHabit(habit.id);
                        });
                    }

                    // Ensure Order O(n)
                    if (listEl.children[index] !== nodeRef.li) {
                        listEl.insertBefore(nodeRef.li, listEl.children[index] || null);
                    }

                    // Sync State Safely
                    nodeRef.li.className = `habit-card ${isCompleted ? 'completed' : ''}`;
                    nodeRef.toggleBtn.setAttribute('aria-pressed', isCompleted.toString());

                    if (nodeRef.nameSpan.textContent !== habit.name) {
                        nodeRef.nameSpan.textContent = habit.name;
                    }
                    
                    if (streakCount > 0) {
                        if (nodeRef.streakDiv.textContent !== `🔥 ${streakCount} day streak`) {
                            nodeRef.streakDiv.textContent = '';
                            const icon = document.createElement('span');
                            icon.className = 'streak-icon';
                            icon.textContent = '🔥';
                            nodeRef.streakDiv.append(icon, ` ${streakCount} day streak`);
                        }
                    } else {
                        if (nodeRef.streakDiv.textContent !== 'Ready to start') {
                            nodeRef.streakDiv.textContent = 'Ready to start';
                        }
                    }
                });

                progressDisplay.textContent = completedTodayCount === habits.length 
                    ? 'All done for today! 🎉' 
                    : `${completedTodayCount} / ${habits.length} completed today`;
            }
        };

        const toggleHabit = (id) => {
            const habit = habits.find(h => h.id === id);
            if (!habit) return;
            const today = getTodayString();
            
            if (habit.completedDates.includes(today)) {
                habit.completedDates = habit.completedDates.filter(d => d !== today);
            } else {
                habit.completedDates.push(today);
            }
            saveData();
            render();
        };

        const addHabit = (name) => {
            if (habits.length >= CONFIG.MAX_HABITS) return;
            const cleanName = cleanInput(name);
            
            habits.push({
                id: generateStableId(),
                name: cleanName,
                createdAt: getTodayString(),
                completedDates: []
            });
            saveData();
            render();
        };

        const deleteHabit = (id) => {
            if (confirm("Delete this habit?")) {
                habits = habits.filter(h => h.id !== id);
                saveData();
                render();
            }
        };

        // --- 11. Event Initialization ---
        const initApp = () => {
            // Prevent double bootstrapping
            if (window.__HABITS_INITIALIZED__) return;
            window.__HABITS_INITIALIZED__ = true;

            setDateHeader();
            scheduleMidnightUpdate();
            loadData();
            render();

            suggestedBtn.addEventListener('click', () => {
                addHabit('Drink water');
            });

            inputEl.addEventListener('input', (e) => {
                inputEl.classList.remove('input-duplicate');
                const val = cleanInput(e.target.value);
                addBtn.disabled = !isValidHabitName(val);
            });

            formEl.addEventListener('submit', (e) => {
                e.preventDefault();
                if (isSubmitting) return;

                const val = cleanInput(inputEl.value);
                if (!isValidHabitName(val)) return;

                if (isDuplicateHabit(val)) {
                    inputEl.classList.remove('input-duplicate');
                    void inputEl.offsetWidth; // trigger reflow
                    inputEl.classList.add('input-duplicate');
                    return;
                }

                if (habits.length >= CONFIG.MAX_HABITS) {
                    alert('Maximum habits limit reached.');
                    return;
                }

                isSubmitting = true;
                addHabit(val);
                inputEl.value = '';
                addBtn.disabled = true;
                inputEl.blur();
                
                // Deterministic unlock
                requestAnimationFrame(() => {
                    isSubmitting = false;
                });
            });
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
