<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Habits</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #007aff;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow-subtle: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-elevated: 0 4px 16px rgba(0, 0, 0, 0.08);
            --border-radius: 16px;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
            padding-bottom: 100px;
        }

        /* Accessibility: Focus visible styling */
        :focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }
        
        header {
            padding: var(--spacing-xl) 0 var(--spacing-md);
            position: sticky;
            top: 0;
            background: rgba(245, 245, 247, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 10;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: var(--spacing-xs);
        }
        
        .date-display {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-text {
            font-size: 14px;
            color: var(--accent-color);
            font-weight: 600;
            margin-top: var(--spacing-xs);
            min-height: 21px;
            transition: opacity 0.3s ease;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 64px var(--spacing-md);
            animation: fadeIn 0.4s ease;
        }
        
        .empty-state-icon {
            width: 64px;
            height: 64px;
            background: var(--surface-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-subtle);
            margin-bottom: var(--spacing-lg);
            color: var(--accent-color);
        }
        
        .empty-state h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
        }
        
        .empty-state p {
            color: var(--text-secondary);
            font-size: 15px;
            max-width: 260px;
        }

        .suggested-btn {
            background: rgba(0, 122, 255, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(0, 122, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: var(--spacing-md);
            box-shadow: var(--shadow-subtle);
            min-height: 44px; /* Mobile safe tap target */
        }

        .suggested-btn:active {
            transform: scale(0.96);
            background: rgba(0, 122, 255, 0.2);
        }
        
        .habit-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }
        
        .habit-card {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            padding: var(--spacing-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-subtle);
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s ease, opacity 0.3s ease, background-color 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.02);
            animation: slideUp 0.3s ease forwards;
            user-select: none;
        }

        .habit-card:focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: -2px;
        }
        
        .habit-card:active {
            transform: scale(0.98);
            background-color: #fafafa;
        }
        
        .habit-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            padding-right: var(--spacing-sm);
            overflow: hidden;
        }
        
        .habit-name {
            font-size: 16px;
            font-weight: 600;
            transition: color 0.2s ease;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .habit-streak {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .streak-icon {
            color: #ff9500;
            font-size: 12px;
        }
        
        .checkbox-container {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            background: transparent;
            position: relative;
        }

        /* Expands tap target size securely for mobile */
        .checkbox-container::after {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px; 
        }
        
        .checkbox-container svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 24;
            stroke-dashoffset: 24;
            transition: stroke-dashoffset 0.3s cubic-bezier(0.65, 0, 0.45, 1);
        }
        
        .habit-card.completed {
            opacity: 0.75;
            background-color: #fafafa;
        }

        .habit-card.completed .checkbox-container {
            background: var(--accent-color);
            border-color: var(--accent-color);
            transform: scale(1.05);
        }
        
        .habit-card.completed .checkbox-container svg {
            stroke-dashoffset: 0;
        }
        
        .habit-card.completed .habit-name {
            color: var(--text-secondary);
            text-decoration: line-through;
            text-decoration-color: rgba(0,0,0,0.2);
        }
        
        .add-form-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: var(--spacing-md) var(--spacing-md) calc(var(--spacing-md) + env(safe-area-inset-bottom));
            background: rgba(245, 245, 247, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            z-index: 20;
        }
        
        .add-form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: var(--spacing-sm);
        }
        
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 14px var(--spacing-md);
            font-size: 16px; /* 16px minimum prevents iOS zoom */
            border: 1px solid var(--border-color);
            border-radius: 24px;
            background: var(--surface-color);
            color: var(--text-primary);
            outline: none;
            box-shadow: var(--shadow-subtle);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        
        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }
        
        input[type="text"]::placeholder {
            color: #a1a1a6;
        }
        
        button[type="submit"] {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: var(--accent-color);
            color: white;
            border: none;
            font-size: 24px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-subtle);
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        
        button[type="submit"]:active {
            transform: scale(0.92);
            background: #0062cc;
        }
        
        button[type="submit"]:disabled {
            background: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }
        
        .delete-btn {
            background: transparent;
            border: none;
            color: #ff3b30;
            width: 44px; /* Accessible tap target */
            height: 44px; /* Accessible tap target */
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            cursor: pointer;
            margin-right: -4px; /* Offset to keep visual spacing pristine */
        }
        
        .habit-card:hover .delete-btn,
        .habit-card:focus-within .delete-btn {
            opacity: 1;
            pointer-events: auto;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Reduced Motion for Accessibility */
        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
        
        @media (max-width: 600px) {
            .habit-card:hover .delete-btn {
                opacity: 0;
            }
            .delete-btn {
                opacity: 1;
                pointer-events: auto;
                color: #d2d2d7; 
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="date-display" id="date-display" aria-live="polite">Today</div>
            <h1>Habits</h1>
            <div id="progress-text" class="progress-text" aria-live="polite" aria-atomic="true"></div>
        </header>

        <main>
            <div class="empty-state" id="empty-state" style="display: none;">
                <div class="empty-state-icon" aria-hidden="true">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h2>Build consistency</h2>
                <p>Start tracking your daily routines. Add your first habit below.</p>
                <div id="onboarding-cta" style="display: none;">
                    <button type="button" class="suggested-btn" id="suggested-btn">Start with "Drink water"</button>
                </div>
            </div>

            <ul class="habit-list" id="habit-list" aria-label="Your Habits"></ul>
        </main>
    </div>

    <div class="add-form-container">
        <form class="add-form" id="add-habit-form">
            <div class="input-wrapper">
                <input type="text" id="habit-input" placeholder="Add a new habit..." autocomplete="off" aria-label="Add a new habit" maxlength="60">
            </div>
            <button type="submit" id="add-btn" aria-label="Add habit" disabled>+</button>
        </form>
    </div>

    <script>
        // 1. Manifest Injection (Preserved)
        const manifest = {
            name: "Habits Tracker",
            short_name: "Habits",
            display: "standalone",
            background_color: "#f5f5f7",
            theme_color: "#ffffff",
            start_url: location.href.split('?')[0],
            icons: [{
                src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIyIiBmaWxsPSIjMDA3YWZmIi8+PHBhdGggZD0iTTMwIDUwIEw0NSA2NSBMMzAgMzAiIHN0cm9rZT0iI2ZmZiIgc3Ryb2tlLXdpZHRoPSI4IiBmaWxsPSJub25lIi8+PC9zdmc+",
                sizes: "192x192",
                type: "image/svg+xml"
            }]
        };
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
        document.head.appendChild(manifestLink);

        // 2. Safe Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Fails gracefully in standalone mode or if file does not exist, no console spam.
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }

        // 3. Safe Storage Wrappers & State Setup
        const STORAGE_KEY = 'mckinsey_habits_v3';
        
        const safeGetStorage = (key) => {
            try { return localStorage.getItem(key); } catch(e) { return null; }
        };
        const safeSetStorage = (key, val) => {
            try { localStorage.setItem(key, val); } catch(e) {}
        };
        
        let habits = [];
        let isFirstVisit = safeGetStorage('habit_first_visit') !== 'false';

        const listEl = document.getElementById('habit-list');
        const emptyStateEl = document.getElementById('empty-state');
        const formEl = document.getElementById('add-habit-form');
        const inputEl = document.getElementById('habit-input');
        const addBtn = document.getElementById('add-btn');
        const dateDisplay = document.getElementById('date-display');
        const progressDisplay = document.getElementById('progress-text');
        const onboardingCta = document.getElementById('onboarding-cta');
        const suggestedBtn = document.getElementById('suggested-btn');

        // 4. Input Sanitization & ID Generation Utilities
        const generateStableId = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return Date.now().toString(36) + Math.random().toString(36).substring(2, 9);
        };

        const cleanInput = (str) => String(str).replace(/\s+/g, ' ').trim();
        
        const isValidHabitName = (str) => {
            const cleaned = cleanInput(str);
            // Rejects invisible unicode characters and empty strings
            return cleaned.length > 0 && cleaned.length <= 60 && /[^\s\u200B-\u200D\uFEFF]/.test(cleaned);
        };

        const isDuplicateHabit = (str) => {
            const target = cleanInput(str).toLowerCase();
            return habits.some(h => cleanInput(h.name).toLowerCase() === target);
        };

        const escapeHTML = (str) => {
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag));
        };

        // 5. Date Helpers (Strict Timezone Safe Local Dates)
        const getTodayString = () => {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const getPreviousDateString = (dateStr) => {
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            const year = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10) - 1;
            const day = parseInt(parts[2], 10);
            
            const d = new Date(year, month, day);
            d.setDate(d.getDate() - 1);
            
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const dy = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${dy}`;
        };

        const setDateHeader = () => {
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            dateDisplay.textContent = new Date().toLocaleDateString('en-US', options).toUpperCase();
        };

        // 6. Strict Data Management Guarantee
        const validateDateFormat = (d) => /^\d{4}-\d{2}-\d{2}$/.test(d);
        
        const loadData = () => {
            const data = safeGetStorage(STORAGE_KEY) || safeGetStorage('mckinsey_habits_v2');
            let rawHabits = [];
            
            if (data) {
                try { rawHabits = JSON.parse(data); } catch (e) { rawHabits = []; }
            } else {
                const oldData = safeGetStorage('mckinsey_habits_v1');
                if (oldData) {
                    try {
                        const parsedOld = JSON.parse(oldData);
                        rawHabits = parsedOld.map(h => ({
                            id: h.id ? String(h.id) : generateStableId(),
                            name: h.name || 'Unnamed',
                            createdAt: h.createdAt || getTodayString(),
                            completedDates: h.lastCompletedDate && h.lastCompletedDate !== 'previous_date_placeholder' ? [h.lastCompletedDate] : []
                        }));
                    } catch (e) { rawHabits = []; }
                }
            }

            // Enforce schema & sanitize corrupted arrays
            habits = (Array.isArray(rawHabits) ? rawHabits : []).map(h => {
                const validCompleted = Array.isArray(h.completedDates) 
                    ? [...new Set(h.completedDates.filter(validateDateFormat))] 
                    : [];
                return {
                    id: h.id ? String(h.id) : generateStableId(),
                    name: h.name && typeof h.name === 'string' ? cleanInput(h.name) : 'Unnamed Habit',
                    createdAt: validateDateFormat(h.createdAt) ? h.createdAt : getTodayString(),
                    completedDates: validCompleted
                };
            });
            saveData();
        };

        const saveData = () => {
            safeSetStorage(STORAGE_KEY, JSON.stringify(habits));
        };

        // 7. Strict Deterministic Streak Logic
        const calculateStreak = (completedDates) => {
            if (!completedDates || !Array.isArray(completedDates) || completedDates.length === 0) return 0;
            const datesSet = new Set(completedDates);
            const today = getTodayString();
            const yesterday = getPreviousDateString(today);

            let streak = 0;
            let expectedDate = today;

            if (datesSet.has(today)) {
                expectedDate = today;
            } else if (datesSet.has(yesterday)) {
                expectedDate = yesterday;
            } else {
                return 0; // Gap before yesterday means 0 streak
            }

            while (datesSet.has(expectedDate)) {
                streak++;
                expectedDate = getPreviousDateString(expectedDate);
            }
            
            return streak;
        };

        // 8. Actions & Mutations
        const toggleHabit = (id) => {
            const habit = habits.find(h => h.id === id);
            if (!habit) return;
            const today = getTodayString();
            
            if (habit.completedDates.includes(today)) {
                habit.completedDates = habit.completedDates.filter(d => d !== today);
            } else {
                habit.completedDates.push(today);
            }
            
            saveData();
            render();
        };

        const addHabit = (name) => {
            const cleanName = cleanInput(name);
            if (!isValidHabitName(cleanName) || isDuplicateHabit(cleanName)) return;

            const newHabit = {
                id: generateStableId(),
                name: cleanName,
                createdAt: getTodayString(),
                completedDates: []
            };
            habits.push(newHabit);
            saveData();
            render();
        };

        const deleteHabit = (id) => {
            if (confirm("Delete this habit?")) {
                habits = habits.filter(h => h.id !== id);
                saveData();
                render();
            }
        };

        // 9. Minimalist DOM Reconciliation (Rendering Optimization)
        const render = () => {
            const today = getTodayString();
            let completedTodayCount = 0;

            if (habits.length === 0) {
                emptyStateEl.style.display = 'flex';
                listEl.style.display = 'none';
                progressDisplay.textContent = '';
                
                if (isFirstVisit) {
                    onboardingCta.style.display = 'block';
                } else {
                    onboardingCta.style.display = 'none';
                }
                listEl.innerHTML = ''; // Safe to clear when empty
            } else {
                emptyStateEl.style.display = 'none';
                listEl.style.display = 'flex';
                
                if (isFirstVisit) {
                    safeSetStorage('habit_first_visit', 'false');
                    isFirstVisit = false;
                }

                // Remove DOM nodes that are no longer in habits array
                const habitIds = new Set(habits.map(h => h.id));
                Array.from(listEl.children).forEach(child => {
                    if (!habitIds.has(child.dataset.id)) {
                        child.remove();
                    }
                });

                // Update or Create DOM nodes safely
                habits.forEach((habit, index) => {
                    const isCompleted = habit.completedDates.includes(today);
                    if (isCompleted) completedTodayCount++;
                    const streakCount = calculateStreak(habit.completedDates);

                    let li = listEl.querySelector(`li[data-id="${escapeHTML(habit.id)}"]`);
                    
                    if (!li) {
                        li = document.createElement('li');
                        li.dataset.id = habit.id;
                        li.setAttribute('role', 'button');
                        li.setAttribute('tabindex', '0');
                        // No inline handlers; DOM template string without user input strings avoids injection vulnerabilities.
                        li.innerHTML = `
                            <div class="habit-info">
                                <span class="habit-name"></span>
                                <span class="habit-streak"></span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <button type="button" class="delete-btn" aria-label="Delete habit" tabindex="-1">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    </svg>
                                </button>
                                <div class="checkbox-container" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </div>
                            </div>
                        `;
                        // Insert carefully to maintain ordering
                        if (index >= listEl.children.length) {
                            listEl.appendChild(li);
                        } else {
                            listEl.insertBefore(li, listEl.children[index]);
                        }
                    }

                    // Sync state to UI safely
                    li.className = `habit-card ${isCompleted ? 'completed' : ''}`;
                    li.setAttribute('aria-pressed', isCompleted.toString());

                    const nameEl = li.querySelector('.habit-name');
                    if (nameEl.textContent !== habit.name) {
                        nameEl.textContent = habit.name; // Bulletproof XSS mitigation
                    }
                    
                    const streakText = streakCount > 0 ? `<span class="streak-icon">🔥</span> ${streakCount} day streak` : 'Ready to start';
                    const streakEl = li.querySelector('.habit-streak');
                    if (streakEl.innerHTML !== streakText) {
                        streakEl.innerHTML = streakText; // Safe: controlled output
                    }
                });

                // Ensure proper DOM ordering matches array ordering
                habits.forEach((h, i) => {
                    const node = listEl.querySelector(`li[data-id="${escapeHTML(h.id)}"]`);
                    if (listEl.children[i] !== node) {
                        listEl.insertBefore(node, listEl.children[i]);
                    }
                });

                if (completedTodayCount === habits.length) {
                    progressDisplay.textContent = 'All done for today! 🎉';
                } else {
                    progressDisplay.textContent = `${completedTodayCount} / ${habits.length} completed today`;
                }
            }
        };

        // 10. Event Delegation & Listeners (CSP Compliant, Collision Free)
        listEl.addEventListener('click', (e) => {
            const deleteBtn = e.target.closest('.delete-btn');
            const card = e.target.closest('.habit-card');

            if (deleteBtn && card) {
                e.stopPropagation(); // Prevent toggling when deleting
                deleteHabit(card.dataset.id);
                return;
            }

            if (card) {
                toggleHabit(card.dataset.id);
            }
        });

        listEl.addEventListener('keydown', (e) => {
            const card = e.target.closest('.habit-card');
            if (!card) return;
            
            // Full keyboard accessibility mapping
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault(); // Prevent scrolling on spacebar
                toggleHabit(card.dataset.id);
            }
        });

        suggestedBtn.addEventListener('click', () => {
            addHabit('Drink water');
        });

        inputEl.addEventListener('input', (e) => {
            const val = cleanInput(e.target.value);
            addBtn.disabled = !isValidHabitName(val);
        });

        let isSubmitting = false; // Prevent double rapid submits
        formEl.addEventListener('submit', (e) => {
            e.preventDefault();
            if (isSubmitting) return;

            const val = cleanInput(inputEl.value);
            if (!isValidHabitName(val)) return;

            if (isDuplicateHabit(val)) {
                inputEl.value = '';
                const originalPlaceholder = inputEl.placeholder;
                inputEl.placeholder = 'Habit already exists...';
                setTimeout(() => {
                    inputEl.placeholder = originalPlaceholder;
                }, 2000);
                return;
            }

            isSubmitting = true;
            addHabit(val);
            inputEl.value = '';
            addBtn.disabled = true;
            inputEl.blur();
            
            setTimeout(() => { isSubmitting = false; }, 300);
        });

        // 11. Initialization & Reliable Timers
        document.addEventListener('DOMContentLoaded', () => {
            setDateHeader();
            loadData();
            render();

            // Auto-refresh date at midnight if app is left open
            setInterval(() => {
                const currentDisplay = dateDisplay.textContent;
                const options = { weekday: 'long', month: 'long', day: 'numeric' };
                const newDisplay = new Date().toLocaleDateString('en-US', options).toUpperCase();
                
                if (currentDisplay !== newDisplay) {
                    setDateHeader();
                    render(); // Re-render derived UI like streaks and daily status
                }
            }, 60000); 
        });
    </script>
</body>
</html>
